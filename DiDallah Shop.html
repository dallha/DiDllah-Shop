<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DiDallah Shop — Beauté & élégance de Dakar</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700&family=Bodoni+Moda:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Italiana&family=Outfit:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap">

<link rel="stylesheet" href="site/styles.css">
</head>
<body>

<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Web components -->
<script src="site/image-slot.js"></script>

<!-- App scripts (order matters: data → store → ui → nav → cards → pages → app) -->
<script type="text/babel" src="site/tweaks-panel.jsx"></script>
<script type="text/babel" src="site/data.jsx"></script>
<script type="text/babel" src="site/store.jsx"></script>
<script type="text/babel" src="site/ui.jsx"></script>
<script type="text/babel" src="site/nav.jsx"></script>
<script type="text/babel" src="site/product-card.jsx"></script>
<script type="text/babel" src="site/page-home.jsx"></script>
<script type="text/babel" src="site/page-univers.jsx"></script>
<script type="text/babel" src="site/page-product.jsx"></script>
<script type="text/babel" src="site/page-contact.jsx"></script>
<script type="text/babel" src="site/page-misc.jsx"></script>
<script type="text/babel" src="site/page-settings-admin.jsx"></script>
<script type="text/babel" src="site/page-settings.jsx"></script>
<script type="text/babel" src="site/page-cart.jsx"></script>

<script type="text/babel">
// ════════════════════════════════════════════════════════════════════════
// DiDallah Shop — App shell, router, tweaks
// ════════════════════════════════════════════════════════════════════════
const { useState, useEffect, useMemo, useCallback } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": [
    "#0a2540",
    "#d4af37",
    "#f8f4e9",
    "#c97b4a"
  ],
  "typo": "editorial",
  "density": "compact",
  "cardVariant": "editorial",
  "dark": false,
  "focus": "beaute"
}/*EDITMODE-END*/;

// Palettes — chacune : [ink, gold, paper, accent]
const PALETTES = [
  ["#1a1410", "#c9a96e", "#f4ede4", "#8b1e2d"],   // Noir & or signature
  ["#0a2540", "#d4af37", "#f8f4e9", "#c97b4a"],   // Bleu nuit & or
  ["#2d1b2e", "#c8847a", "#f9eee8", "#88563f"],   // Aubergine & rose
  ["#1f2a23", "#cba35c", "#efe9dc", "#a8493c"],   // Vert forêt & cuivre
];

function applyTweaksToDOM(t) {
  const root = document.documentElement;
  // dark mode
  root.dataset.mode = t.dark ? "dark" : "light";
  root.dataset.density = t.density;
  root.dataset.typo = t.typo;

  // palette → CSS vars
  const [ink, gold, paper, accent] = t.palette || PALETTES[0];
  root.style.setProperty("--ink", ink);
  root.style.setProperty("--gold", gold);
  root.style.setProperty("--paper", paper);
  root.style.setProperty("--accent", accent);

  // derive helpers using CSS color-mix at runtime is done via fallback values in CSS,
  // but we also set a few derived ones for accuracy
  root.style.setProperty("--paper-2", mix(paper, ink, 0.06));
  root.style.setProperty("--ink-soft", mix(ink, paper, 0.18));
  root.style.setProperty("--gold-soft", mix(gold, paper, 0.28));
  root.style.setProperty("--gold-deep", mix(gold, ink, 0.28));
  root.style.setProperty("--muted", `${ink}88`);
  root.style.setProperty("--line", `${ink}28`);
  root.style.setProperty("--line-on-dark", `${paper}38`);
}

// quick hex mixer
function mix(a, b, t) {
  const pa = parseHex(a), pb = parseHex(b);
  const r = Math.round(pa[0] * (1 - t) + pb[0] * t);
  const g = Math.round(pa[1] * (1 - t) + pb[1] * t);
  const bl = Math.round(pa[2] * (1 - t) + pb[2] * t);
  return "#" + [r, g, bl].map((n) => n.toString(16).padStart(2, "0")).join("");
}
function parseHex(h) {
  const s = h.replace("#", "");
  return [parseInt(s.slice(0, 2), 16), parseInt(s.slice(2, 4), 16), parseInt(s.slice(4, 6), 16)];
}

// ── App root ────────────────────────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = useState({ name: "home", params: {} });
  const [wishlist, toggleWishlist] = useWishlist();
  useSiteVersion(); // re-render quand le store admin change

  useEffect(() => { applyTweaksToDOM(t); }, [t]);

  const navigate = useCallback((next) => {
    setRoute(next);
    // scroll to top of scroll container
    requestAnimationFrame(() => {
      const el = document.querySelector(".dd-scroll");
      if (el) el.scrollTo({ top: 0, behavior: "instant" });
    });
  }, []);

  // Render the current page
  let page = null;
  if (route.name === "home")    page = <HomePage navigate={navigate} wishlist={wishlist} toggleWishlist={toggleWishlist} focus={t.focus} />;
  else if (route.name === "univers")  page = <UniversPage route={route} navigate={navigate} wishlist={wishlist} toggleWishlist={toggleWishlist} cardVariant={t.cardVariant} />;
  else if (route.name === "produit")  page = <ProductPage route={route} navigate={navigate} wishlist={wishlist} toggleWishlist={toggleWishlist} />;
  else if (route.name === "contact")  page = <ContactPage navigate={navigate} />;
  else if (route.name === "journal")  page = <JournalPage navigate={navigate} />;
  else if (route.name === "wishlist") page = <WishlistPage navigate={navigate} wishlist={wishlist} toggleWishlist={toggleWishlist} />;
  else if (route.name === "settings") page = <SettingsPage navigate={navigate} />;
  else if (route.name === "cart")     page = <CartPage navigate={navigate} />;
  else page = <HomePage navigate={navigate} wishlist={wishlist} toggleWishlist={toggleWishlist} focus={t.focus} />;

  return (
    <div className="dd-scroll">
      <TopBar route={route} navigate={navigate} wishlistCount={wishlist.size} density={t.density} />
      {page}
      <Footer navigate={navigate} />

      <TweaksPanel>
        <TweakSection label="Palette">
          <TweakColor
            label="Maison"
            value={t.palette}
            options={PALETTES}
            onChange={(v) => setTweak("palette", v)}
          />
          <TweakToggle
            label="Mode sombre"
            value={t.dark}
            onChange={(v) => setTweak("dark", v)}
          />
        </TweakSection>

        <TweakSection label="Typographie">
          <TweakSelect
            label="Famille"
            value={t.typo}
            options={[
              { value: "editorial", label: "Cormorant + Manrope" },
              { value: "bodoni",    label: "Bodoni + Inter" },
              { value: "display",   label: "DM Serif + DM Sans" },
              { value: "italiana",  label: "Italiana + Outfit" },
            ]}
            onChange={(v) => setTweak("typo", v)}
          />
        </TweakSection>

        <TweakSection label="Mise en page">
          <TweakRadio
            label="Densité"
            value={t.density}
            options={["compact", "regular", "comfy"]}
            onChange={(v) => setTweak("density", v)}
          />
          <TweakSelect
            label="Cartes produit"
            value={t.cardVariant}
            options={[
              { value: "editorial", label: "Éditorial (numérotée)" },
              { value: "default",   label: "Hover quick-view" },
              { value: "minimal",   label: "Minimal carré" },
            ]}
            onChange={(v) => setTweak("cardVariant", v)}
          />
          <TweakRadio
            label="Univers mis en avant"
            value={t.focus}
            options={[
              { value: "balanced", label: "Équilibré" },
              { value: "beaute",   label: "Beauté" },
              { value: "mode",     label: "Mode" },
            ]}
            onChange={(v) => setTweak("focus", v)}
          />
        </TweakSection>

        <TweakSection label="Navigation rapide">
          <TweakButton label="↗ Accueil"        onClick={() => navigate({ name: "home" })} secondary />
          <TweakButton label="↗ Boutique"       onClick={() => navigate({ name: "univers", params: {} })} secondary />
          <TweakButton label="↗ Page produit"   onClick={() => navigate({ name: "produit", params: { id: "boubou-femme-brode" } })} secondary />
          <TweakButton label="↗ Contact & Livraison" onClick={() => navigate({ name: "contact" })} secondary />
          <TweakButton label="↗ Journal"        onClick={() => navigate({ name: "journal" })} secondary />
          <TweakButton label="↗ Paramètres"     onClick={() => navigate({ name: "settings" })} secondary />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

</body>
</html>
